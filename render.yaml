services:
  - type: web
    name: aegiscx-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: singapore
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: .
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: GOOGLE_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: "https://cfisv1577.netlify.app"
      - key: DATABASE_URL
        fromDatabase:
          name: aegiscx-db
          property: connectionString

# Production Auto-Update Trigger
# Region: Singapore (Optimized for India)
# Last Verified: 2026-04-28

databases:
  - name: aegiscx-db
    user: aegiscx
    plan: free
    region: singapore # Closest to India
